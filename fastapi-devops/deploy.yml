---
- name: Deploy FastAPI Stack to Docker Swarm
  hosts: target_nodes
  remote_user: root
  tasks:
    - name: Create project directory on Manager
      file: 
        path: /root/fastapi-app 
        state: directory

    - name: Copy project files to Manager
      copy: 
        src: ./ 
        dest: /root/fastapi-app/

    - name: Build FastAPI Docker Image on Manager
      shell: cd /root/fastapi-app && docker build -t fastapi-app:latest .

    - name: Deploy or Update the Stack
      # 'docker stack deploy' looks at your docker-compose.yml and 
      # ensures the actual state matches your desired replicas.
      shell: docker stack deploy -c /root/fastapi-app/docker-compose.yml fastapi_stack



