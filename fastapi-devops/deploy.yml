---
- name: Deploy FastAPI App to Swarm Cluster
  hosts: target_nodes
  become: yes
  vars:
    app_name: "monitor_fastapi-app"
    app_image: "my-fastapi-app:latest"

  tasks:
    - name: Ensure project directory exists
      file:
        path: /root/fastapi-app
        state: directory
        mode: '0755'

    - name: Deploy FastAPI as a Swarm Service
      community.docker.docker_swarm_service:
        name: "{{ app_name }}"
        image: "{{ app_image }}"
        networks:
          - monitor_net
        replicas: 2
        publish_ports:
          - target_port: 8000
            published_port: 8000
        restart_config:
          condition: on-failure
        update_config:
          parallelism: 1
          delay: 10s
      register: swarm_res

    - name: Display Deployment Status
      debug:
        msg: "Service {{ app_name }} is now {{ 'running' if swarm_res.failed == false else 'failed' }}"
